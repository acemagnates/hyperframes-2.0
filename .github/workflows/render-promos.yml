name: Render Promo Clips

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: desktop
            project_dir: videos/ace-magnates-promo-dynamic-desktop
            output_file: renders/ace-magnates-dynamic-desktop.mp4
          - name: mobile
            project_dir: videos/ace-magnates-promo-dynamic-mobile
            output_file: renders/ace-magnates-dynamic-mobile.mp4

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Verify HyperFrames environment
        run: npx hyperframes doctor

      - name: Verify project
        working-directory: ${{ matrix.project_dir }}
        run: |
          npx hyperframes lint .
          npx hyperframes validate .

      - name: Render clip
        working-directory: ${{ matrix.project_dir }}
        run: |
          mkdir -p renders
          npx hyperframes render . \
            --output "${{ matrix.output_file }}" \
            --quality high \
            --fps 60 \
            --strict

      - name: Upload render artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-promo-render
          path: ${{ matrix.project_dir }}/${{ matrix.output_file }}
          if-no-files-found: error
